<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aplikasi Gudang Lengkap</title>
<style>
  /* Style umum aplikasi */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #fff;
    color: #222;
    margin: 0;
    padding: 20px;
    line-height: 1.5;
  }
  #loginBox, #app {
    max-width: 400px;
    margin: 0 auto;
  }
  input, select, button {
    width: 100%;
    padding: 10px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    background-color: #111;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #333;
  }
  .nav {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .nav button {
    flex: 1 1 100px;
    font-size: 12px;
    padding: 10px 6px;
    white-space: nowrap;
  }
  #hasil, #hasil-finder, #hasil-label, #hasil-dashboard {
    margin-top: 15px;
  }
  /* Style khusus untuk tabel MATRIX */
  .matrix-table {
    border-collapse: collapse;
    width: 220px;
    margin-top: 15px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
  }
  .matrix-table thead tr {
    background-color: #111;
    color: #fff;
    text-transform: uppercase;
  }
  .matrix-table th,
  .matrix-table td {
    border: 1px solid #111;
    padding: 10px 12px;
    text-align: center;
  }
  .matrix-table tbody tr:nth-child(even) {
    background-color: #f9f9f9;
  }
  .matrix-table tbody tr:hover {
    background-color: #eaeaea;
    transition: background-color 0.3s ease;
  }
  /* Style khusus untuk hasil FINDER */
  #hasil-finder > div {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 15px 20px;
    max-width: 320px;
    font-size: 14px;
    background-color: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    line-height: 1.4;
  }
  #hasil-finder > div div {
    margin: 6px 0;
  }
  #hasil-finder > div div strong {
    display: inline-block;
    width: 90px;
    font-weight: 600;
    color: #111;
  }
  /* Label cetak */
  .label {
    width: 50mm;
    height: 30mm;
    padding: 2mm;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    background: #fff;
  }
  .label .sku {
    font-weight: bold;
    font-size: 10px;
  }
  .label .text {
    font-size: 8px;
  }
  .label .barcode img {
    width: 100%;
    height: 12mm;
    object-fit: contain;
  }
  /* Spinner loading */
  #loading {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.7);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 5px solid #eee;
    border-top: 5px solid #111;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="loginBox">
  <h2>Login</h2>
  <input id="u" placeholder="Username" />
  <input id="p" type="password" placeholder="Password" />
  <button onclick="doLogin()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3 id="nama"></h3>
  <div class="nav">
    <button onclick="scanPage('MASUK')">SCAN MASUK</button>
    <button onclick="scanPage('KELUAR')">SCAN KELUAR</button>
    <button onclick="finderPage()">FINDER</button>
    <button onclick="matrixPage()">MATRIX</button>
    <button onclick="labelPage()">LABEL</button>
    <button onclick="dashboard()">LOG</button>
  </div>
  <div id="content"></div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
  const API = 'https://script.google.com/macros/s/AKfycbxCdfTBoBW8-wIxE-Xfg6tQhAMNmrH9ACpRQuWOY-tK5SqM7d7ZOYIY-XUEyZMQ6VzM/exec'; // Ganti dengan URL backend Anda
  let USER = '';

  const elLogin = document.getElementById('loginBox');
  const elApp = document.getElementById('app');
  const elNama = document.getElementById('nama');
  const elContent = document.getElementById('content');
  const elLoading = document.getElementById('loading');

  function showLoading() { elLoading.style.display = 'flex'; }
  function hideLoading() { elLoading.style.display = 'none'; }

  function doLogin() {
    const username = document.getElementById('u').value.trim();
    const password = document.getElementById('p').value.trim();
    if (!username || !password) return alert('Isi username dan password');

    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'login', data: { username, password } })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (data.status) {
        USER = data.nama;
        elLogin.style.display = 'none';
        elApp.style.display = 'block';
        elNama.textContent = 'Hi ' + USER;
      } else {
        alert('Login gagal');
      }
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }

  let DD = null;
  function loadDropdown(callback) {
    if (DD) return callback();
    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'dropdown' })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (!data || !data.kategori) return alert('Dropdown gagal');
      DD = data;
      callback();
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }

  function fillSelect(id, arr) {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">-- pilih --</option>';
    arr.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      el.appendChild(opt);
    });
  }

  // ===== FINDER =====
  function finderPage() {
    elContent.innerHTML = `
      <h3>FINDER</h3>
      <select id="fk"></select>
      <select id="fp"></select>
      <select id="fw"></select>
      <select id="fs"></select>
      <button onclick="goFinder()">CARI</button>
      <div id="hasil-finder"></div>
    `;
    loadDropdown(() => {
      fillSelect('fk', DD.kategori);
      document.getElementById('fk').onchange = () => fillSelect('fp', DD.produk[document.getElementById('fk').value] || []);
      document.getElementById('fp').onchange = () => fillSelect('fw', DD.warna);
      document.getElementById('fw').onchange = () => fillSelect('fs', DD.size);
    });
  }

  function goFinder() {
    const kategori = document.getElementById('fk').value;
    const produk = document.getElementById('fp').value;
    const warna = document.getElementById('fw').value;
    const size = document.getElementById('fs').value;

    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'finder', data: { kategori, produk, warna, size } })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (!data.length) {
        elContent.querySelector('#hasil-finder').innerHTML = '<p>Data tidak ditemukan</p>';
        return;
      }
      const d = data[0];
      const html = `
        <div>
          <div><strong>SKU</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.sku}</div>
          <div><strong>Kategori</strong> &nbsp;&nbsp;&nbsp;: ${d.kategori}</div>
          <div><strong>Produk</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.produk}</div>
          <div><strong>Warna</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.warna}</div>
          <div><strong>Ukuran</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.size}</div>
          <div><strong>Lokasi</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.lokasi}</div>
          <div><strong>Jumlah</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${d.stok} pcs</div>
        </div>
      `;
      elContent.querySelector('#hasil-finder').innerHTML = html;
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }

  // ===== MATRIX =====
  function matrixPage() {
    elContent.innerHTML = `
      <h3>MATRIX</h3>
      <select id="mk"></select>
      <select id="mp"></select>
      <select id="mw"></select>
      <button onclick="loadMatrix()">LOAD</button>
      <div id="hasil"></div>
    `;
    loadDropdown(() => {
      fillSelect('mk', DD.kategori);
      document.getElementById('mk').onchange = () => fillSelect('mp', DD.produk[document.getElementById('mk').value] || []);
      fillSelect('mw', DD.warna);
    });
  }

  function loadMatrix() {
    const kategori = document.getElementById('mk').value;
    const produk = document.getElementById('mp').value;
    const warna = document.getElementById('mw').value;

    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'matrix', data: { kategori, produk } })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (!data || !data.warna || !data.size) {
        elContent.querySelector('#hasil').innerHTML = '<p>Data tidak ditemukan</p>';
        return;
      }

      const selectedWarna = warna || data.warna[0];
      const sizeList = data.size;
      const stokData = data.data[selectedWarna];

      let html = `
        <table class="matrix-table">
          <thead>
            <tr>
              <th>UKURAN</th>
              <th>STOK</th>
            </tr>
          </thead>
          <tbody>
      `;

      sizeList.forEach(size => {
        html += `
          <tr>
            <td>${size}</td>
            <td>${stokData[size] || 0}</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      elContent.querySelector('#hasil').innerHTML = html;
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }

  // ===== SCAN BARCODE =====
  function scanPage(jenis) {
    elContent.innerHTML = `
      <h3>SCAN ${jenis}</h3>
      <div id="reader" style="width: 300px; margin: auto;"></div>
      <div id="hasil-scan"></div>
      <button onclick="stopScanner()">STOP SCAN</button>
    `;

    const qr = new Html5Qrcode('reader');
    qr.start({ facingMode: 'environment' }, { fps: 10, qrbox: 250 },
      code => {
        beep();
        qr.stop();
        showLoading();

        fetch(API, {
          method: 'POST',
          body: JSON.stringify({ method: 'scan', data: { qr: code, jenis: jenis, admin: USER } })
        })
        .then(res => res.json())
        .then(data => {
          hideLoading();
          if (data.status) {
            const item = data.item;
            elContent.querySelector('#hasil-scan').innerHTML = `
              <div class="card">
                <div><strong>SKU</strong>: ${item.sku}</div>
                <div><strong>Kategori</strong>: ${item.kategori}</div>
                <div><strong>Produk</strong>: ${item.produk}</div>
                <div><strong>Warna</strong>: ${item.warna}</div>
                <div><strong>Ukuran</strong>: ${item.size}</div>
                <div><strong>Lokasi</strong>: ${item.lokasi}</div>
                <div><strong>Stok Sekarang</strong>: ${data.stok}</div>
              </div>
            `;
          } else {
            alert(data.msg);
          }
        })
        .catch(() => {
          hideLoading();
          alert('API error');
        });
      },
      err => {
        // ignore scan errors
      }
    );

    window.currentScanner = qr;
  }

  function stopScanner() {
    if (window.currentScanner) {
      window.currentScanner.stop();
      window.currentScanner.clear();
      window.currentScanner = null;
      elContent.querySelector('#reader').innerHTML = '';
      elContent.querySelector('#hasil-scan').innerHTML = '';
    }
  }

  function beep() {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  }

  // ===== LABEL PRINTING =====
  function labelPage() {
    elContent.innerHTML = `
      <h3>LABEL</h3>
      <select id="lk"></select>
      <select id="lp"></select>
      <select id="lw"></select>
      <select id="ls"></select>
      <input id="qty" type="number" placeholder="Jumlah Label" value="1" min="1" max="100" />
      <button onclick="loadLabel()">TAMPILKAN</button>
      <div id="hasil-label"></div>
      <button onclick="window.print()">PRINT</button>
    `;
    loadDropdown(() => {
      fillSelect('lk', DD.kategori);
      document.getElementById('lk').onchange = () => fillSelect('lp', DD.produk[document.getElementById('lk').value] || []);
      document.getElementById('lp').onchange = () => fillSelect('lw', DD.warna);
      document.getElementById('lw').onchange = () => fillSelect('ls', DD.size);
    });
  }

  function loadLabel() {
    const qty = parseInt(document.getElementById('qty').value) || 1;
    const kategori = document.getElementById('lk').value;
    const produk = document.getElementById('lp').value;
    const warna = document.getElementById('lw').value;
    const size = document.getElementById('ls').value;

    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'labelFilter', data: { kategori, produk, warna, size } })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (!data.length) {
        alert('Data tidak ditemukan');
        return;
      }
      let html = '';
      data.forEach(d => {
        for (let i = 0; i < qty; i++) {
          html += `
            <div class="label">
              <div class="sku">${d.sku}</div>
              <div class="text">${d.kategori}</div>
              <div class="text">${d.produk}</div>
              <div class="text">${d.warna} / ${d.size}</div>
              <div class="barcode"><img src="https://barcode.tec-it.com/barcode.ashx?data=${d.barcode}&code=Code128&dpi=96" /></div>
            </div>
          `;
        }
      });
      elContent.querySelector('#hasil-label').innerHTML = html;
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }

  // ===== DASHBOARD =====
  function dashboard() {
    showLoading();
    fetch(API, {
      method: 'POST',
      body: JSON.stringify({ method: 'dashboard' })
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (!data.length) {
        elContent.innerHTML = '<p>Tidak ada aktivitas</p>';
        return;
      }
      let html = '<h3>Aktivitas Terakhir</h3>';
      data.forEach(d => {
        html += `<div class="card">${d[0]} ${d[1]}<br>${d[2]} - ${d[3]}</div>`;
      });
      elContent.innerHTML = html;
    })
    .catch(() => {
      hideLoading();
      alert('API error');
    });
  }
</script>

</body>
</html>
