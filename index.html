<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gudang Spalva</title>

<style>
body{font-family:Arial;margin:20px;background:#fff}
.nav button{padding:10px;margin:5px;background:#000;color:#fff;border:none;border-radius:8px}
.card{border:1px solid #ddd;padding:20px;border-radius:12px;margin-top:20px}
select,input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc}
.btn{width:100%;padding:14px;background:#000;color:#fff;border:none;border-radius:10px}
.result{border:1px solid #ddd;padding:20px;border-radius:12px;margin-top:15px}
table{border-collapse:collapse;width:300px;margin:auto;margin-top:20px}
td,th{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#000;color:#fff}
</style>
</head>

<body>

<h1>📦 GUDANG SPALVA</h1>

<div class="nav">
<button onclick="dashboard()">Dashboard</button>
<button onclick="finder()">Finder</button>
<button onclick="matrix()">Matrix</button>
<button onclick="formMasuk()">Barang Masuk</button>
<button onclick="formKeluar()">Barang Keluar</button>
</div>

<div id="app"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz3qUpT8soJu2NGAXwny71nn-goU3i-eE87gLEeykeqlf88SH7M0lfVMzaDSI9Vw286HA/exec";

// ================= DASHBOARD =================
function dashboard(){
 fetch(API+"?action=dashboard")
 .then(r=>r.json())
 .then(data=>{
  let html="<div class='card'><h2>Dashboard</h2><table>";
  html+="<tr><th>Waktu</th><th>SKU</th><th>Jumlah</th><th>Status</th></tr>";
  data.forEach(d=>{
    html+=`<tr><td>${d.waktu}</td><td>${d.sku}</td><td>${d.jumlah}</td><td>${d.status}</td></tr>`;
  });
  html+="</table></div>";
  app.innerHTML=html;
 });
}

// ================= FINDER =================
function finder(){
 fetch(API+"?action=finder")
 .then(r=>r.json())
 .then(data=>{
  window.data=data;

  let kategori=[...new Set(data.map(d=>d.kategori))];

  app.innerHTML=`
  <div class="card">
  <h2>FINDER</h2>

  <select id="k" onchange="pLoad()">${kategori.map(x=>`<option>${x}</option>`).join("")}</select>
  <select id="p" onchange="wLoad()"></select>
  <select id="w" onchange="sLoad()"></select>
  <select id="s"></select>

  <button class="btn" onclick="cari()">CARI</button>
  <div id="hasil"></div>
  </div>`;

  pLoad();
 });
}

function pLoad(){
 let p=[...new Set(data.filter(d=>d.kategori==k.value).map(d=>d.produk))];
 document.getElementById("p").innerHTML=p.map(x=>`<option>${x}</option>`).join("");
 wLoad();
}

function wLoad(){
 let w=[...new Set(data.filter(d=>d.kategori==k.value && d.produk==p.value).map(d=>d.warna))];
 document.getElementById("w").innerHTML=w.map(x=>`<option>${x}</option>`).join("");
 sLoad();
}

function sLoad(){
 let s=[...new Set(data.filter(d=>d.kategori==k.value && d.produk==p.value && d.warna==w.value).map(d=>d.size))];
 document.getElementById("s").innerHTML=s.map(x=>`<option>${x}</option>`).join("");
}

function cari(){
 let d=data.find(x=>x.kategori==k.value && x.produk==p.value && x.warna==w.value && x.size==s.value);

 hasil.innerHTML=`
 <div class="result">
 SKU: ${d.sku}<br>
 Lokasi: ${d.lokasi}<br>
 Stok: ${d.stok}
 </div>`;
}

// ================= MATRIX =================
function matrix(){
 fetch(API+"?action=finder")
 .then(r=>r.json())
 .then(data=>{
  window.mdata=data;

  let kategori=[...new Set(data.map(d=>d.kategori))];

  app.innerHTML=`
  <div class="card">
  <h2>MATRIX</h2>

  <select id="mk" onchange="mpLoad()">${kategori.map(x=>`<option>${x}</option>`).join("")}</select>
  <select id="mp" onchange="mwLoad()"></select>
  <select id="mw"></select>

  <button class="btn" onclick="loadMatrix()">LOAD</button>
  <div id="mhasil"></div>
  </div>`;

  mpLoad();
 });
}

function mpLoad(){
 let p=[...new Set(mdata.filter(d=>d.kategori==mk.value).map(d=>d.produk))];
 mp.innerHTML=p.map(x=>`<option>${x}</option>`).join("");
 mwLoad();
}

function mwLoad(){
 let w=[...new Set(mdata.filter(d=>d.kategori==mk.value && d.produk==mp.value).map(d=>d.warna))];
 mw.innerHTML=w.map(x=>`<option>${x}</option>`).join("");
}

function loadMatrix(){
 let data=mdata.filter(d=>d.kategori==mk.value && d.produk==mp.value && d.warna==mw.value);

 let html="<table><tr><th>UKURAN</th><th>STOK</th></tr>";
 data.forEach(d=>{
  html+=`<tr><td>${d.size}</td><td>${d.stok}</td></tr>`;
 });
 html+="</table>";
 mhasil.innerHTML=html;
}

// ================= MASUK =================
function formMasuk(){
 fetch(API+"?action=finder")
 .then(r=>r.json())
 .then(data=>{
  window.f=data;

  let kategori=[...new Set(data.map(d=>d.kategori))];

  app.innerHTML=`
  <div class="card">
  <h2>BARANG MASUK</h2>

  <select id="ik" onchange="i1()">${kategori.map(x=>`<option>${x}</option>`).join("")}</select>
  <select id="ip" onchange="i2()"></select>
  <select id="iw" onchange="i3()"></select>
  <select id="is" onchange="i4()"></select>

  <div id="isku"></div>
  <input id="ij" type="number" placeholder="Jumlah">

  <button class="btn" onclick="saveMasuk()">Simpan</button>
  </div>`;

  i1();
 });
}

function i1(){ ip.innerHTML=[...new Set(f.filter(d=>d.kategori==ik.value).map(d=>d.produk))].map(x=>`<option>${x}</option>`).join(""); i2();}
function i2(){ iw.innerHTML=[...new Set(f.filter(d=>d.kategori==ik.value && d.produk==ip.value).map(d=>d.warna))].map(x=>`<option>${x}</option>`).join(""); i3();}
function i3(){ is.innerHTML=[...new Set(f.filter(d=>d.kategori==ik.value && d.produk==ip.value && d.warna==iw.value).map(d=>d.size))].map(x=>`<option>${x}</option>`).join(""); i4();}
function i4(){ let d=f.find(x=>x.kategori==ik.value && x.produk==ip.value && x.warna==iw.value && x.size==is.value); isku.innerHTML="SKU: "+d.sku; isku.dataset.sku=d.sku;}

function saveMasuk(){
 fetch(API+`?action=masuk&sku=${isku.dataset.sku}&jumlah=${ij.value}`)
 .then(r=>r.json())
 .then(d=>alert(d.status?"Berhasil":"Gagal"));
}

// ================= KELUAR =================
function formKeluar(){
 fetch(API+"?action=finder")
 .then(r=>r.json())
 .then(data=>{
  window.f=data;

  let kategori=[...new Set(data.map(d=>d.kategori))];

  app.innerHTML=`
  <div class="card">
  <h2>BARANG KELUAR</h2>

  <select id="ok" onchange="o1()">${kategori.map(x=>`<option>${x}</option>`).join("")}</select>
  <select id="op" onchange="o2()"></select>
  <select id="ow" onchange="o3()"></select>
  <select id="os" onchange="o4()"></select>

  <div id="osku"></div>
  <input id="oj" type="number" placeholder="Jumlah">

  <button class="btn" onclick="saveKeluar()">Simpan</button>
  </div>`;

  o1();
 });
}

function o1(){ op.innerHTML=[...new Set(f.filter(d=>d.kategori==ok.value).map(d=>d.produk))].map(x=>`<option>${x}</option>`).join(""); o2();}
function o2(){ ow.innerHTML=[...new Set(f.filter(d=>d.kategori==ok.value && d.produk==op.value).map(d=>d.warna))].map(x=>`<option>${x}</option>`).join(""); o3();}
function o3(){ os.innerHTML=[...new Set(f.filter(d=>d.kategori==ok.value && d.produk==op.value && d.warna==ow.value).map(d=>d.size))].map(x=>`<option>${x}</option>`).join(""); o4();}
function o4(){ let d=f.find(x=>x.kategori==ok.value && x.produk==op.value && x.warna==ow.value && x.size==os.value); osku.innerHTML="SKU: "+d.sku+" | Stok: "+d.stok; osku.dataset.sku=d.sku;}

function saveKeluar(){
 fetch(API+`?action=keluar&sku=${osku.dataset.sku}&jumlah=${oj.value}`)
 .then(r=>r.json())
 .then(d=>alert(d.status?"Berhasil":"Stok tidak cukup"));
}

// INIT
dashboard();

</script>

</body>
</html>
